                                - generic: "- Atalho:"
                              - paragraph: "\"Yuri\" como vai? Muitos negócios perdem clientes porque não conseguem responder rápido no WhatsApp, Instagram e Facebook. E se você tivesse tudo isso centralizado em um só lugar? Posso te mostrar como resolver de forma simples."
