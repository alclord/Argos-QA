apresentação será realizada pela consultora Giulianna. Instruções Adicionais O Atendente que assumirá o caso deve verificar se todas as pendências foram resolvidas. O Atendente deve verificar se o Contato Willian está satisfeito com o atendimento. O Atendente deve registrar todas as atividades realizadas durante o caso. O Atendente deve seguir as orientações do Manual de Atendimento para casos semelhantes."
